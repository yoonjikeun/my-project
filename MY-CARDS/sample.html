<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card News — Sample (1080×1080)</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts: 영문 디스플레이(Montserrat) + 한글(Pretendard) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Montserrat', 'Pretendard', 'sans-serif'],
            body: ['Pretendard', 'Montserrat', 'sans-serif'],
          },
          colors: {
            paper:  '#ECE6DB',   // 따뜻한 크림 종이
            ink:    '#26221C',   // 진한 갈색빛 먹색
            mute:   '#8A8275',   // 흐린 보조 텍스트
            clay:   '#C9A88B',   // 점토색 악센트
          },
        },
      },
    };
  </script>

  <style>
    /* 1080×1080 실제 크기. 화면이 작으면 자동 축소되어 보이도록 스케일 처리 */
    body { background:#d9d4cb; }
    .stage {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:24px;
    }
    .card {
      width:1080px; height:1080px;
      flex:0 0 auto;
      /* 뷰포트보다 크면 줄여서 보여주기 (내보낼 땐 100%로 캡처) */
      transform: scale(var(--s, 1));
      transform-origin: center center;
    }
    /* 사진 자리 — 실제 사진 넣기 전 톤온톤 플레이스홀더 */
    .photo-ph {
      background:
        radial-gradient(120% 90% at 70% 20%, #E7DCCB 0%, #D8C7B0 45%, #C9B49A 100%);
    }
  </style>
</head>
<body class="font-body text-ink">

  <div class="stage">
    <!-- ===================== 1080 × 1080 CARD ===================== -->
    <div class="card bg-paper relative overflow-hidden">

      <!-- 콘텐츠 영역 패딩 96px -->
      <div class="absolute inset-0 flex flex-col px-24 pt-20 pb-[356px]">

        <!-- 상단: 날짜 블록 + 북마크 -->
        <div class="flex items-start justify-between">
          <div class="flex items-end gap-3">
            <span class="font-display font-black leading-none text-[88px] tracking-tight">29</span>
            <div class="font-display font-bold leading-tight text-[22px] pb-2">
              <div>JUNE</div>
              <div class="text-mute">2026</div>
            </div>
          </div>
          <!-- bookmark icon -->
          <svg width="38" height="48" viewBox="0 0 24 30" fill="none" class="mt-2">
            <path d="M3 2h18v26l-9-6-9 6V2z" stroke="#26221C" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- 헤드라인 -->
        <h1 class="font-display font-black tracking-tight leading-[0.92] mt-10 text-[108px]">
          Reminder<br/>today
          <span class="block w-40 h-[6px] bg-ink mt-5"></span>
        </h1>

        <!-- 본문 -->
        <p class="font-body text-[33px] leading-[1.5] text-ink/85 mt-8 max-w-[760px]">
          잘 해내지 않아도 괜찮아.<br/>
          오늘 하루를 무사히 지나온 것만으로<br/>
          이미 충분히 잘하고 있는 거야.
        </p>
        <p class="font-body text-[26px] text-mute mt-6">— 어떤 사람의 메모</p>

        <!-- 크레딧 (사진 밴드 위) -->
        <div class="mt-auto mb-7 flex items-end justify-between font-display text-[22px]">
          <div class="leading-tight">
            <div class="text-mute">card by</div>
            <div class="font-bold">my-cards</div>
          </div>
          <div class="leading-tight text-right">
            <div class="text-mute">pict by</div>
            <div class="font-bold">references</div>
          </div>
        </div>
      </div>

      <!-- 하단 사진 밴드 (정사각 카드의 약 36%) -->
      <div class="absolute bottom-0 left-0 right-0 h-[336px] overflow-hidden">
        <img src="assets/photo-brown.jpg" alt="" class="w-full h-full object-cover" />
      </div>

    </div>
    <!-- =========================================================== -->
  </div>

  <!-- 화면 크기에 맞춰 카드 자동 축소 (실제 1080 유지) -->
  <script>
    function fit() {
      const pad = 48;
      const s = Math.min(1, (window.innerWidth - pad) / 1080, (window.innerHeight - pad) / 1080);
      document.documentElement.style.setProperty('--s', s.toFixed(3));
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
