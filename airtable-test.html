<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airtable DB 테스트</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", "Malgun Gothic", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.6rem; }
    .form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin: 16px 0; }
    input[type=text] { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; background: #764ba2; color: #fff; cursor: pointer; font-size: 0.95rem; }
    button.del { background: #e74c3c; padding: 6px 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    th { color: #555; font-size: 0.85rem; }
    #status { color: #888; font-size: 0.9rem; min-height: 1.2em; margin-top: 10px; }
    .note { background: #fff7e6; border: 1px solid #ffd591; padding: 12px; border-radius: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>☕ Airtable DB 테스트 — Jobmongz1</h1>

  <!-- Cloudflare Worker 주소. 토큰은 Worker 안에 숨겨져 있어 이 URL은 공개돼도 안전합니다. -->
  <script>
    const WORKER_URL = "여기에_Cloudflare_Worker_주소_붙여넣기";
  </script>

  <div class="note">
    ✅ 토큰은 Cloudflare Worker 안에 안전하게 보관됩니다. 이 페이지에는 토큰이 없어 공개 사이트에서도 안전합니다.
  </div>

  <div class="form">
    <input type="text" id="f_name" placeholder="필드명">
    <input type="text" id="f_type" placeholder="타입">
    <input type="text" id="f_desc" placeholder="설명">
    <button onclick="addItem()">추가</button>
  </div>

  <div id="status">불러오는 중...</div>

  <table>
    <thead>
      <tr><th>필드명</th><th>타입</th><th>설명</th><th></th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const API = WORKER_URL;   // 모든 요청은 Cloudflare Worker를 통해 Airtable로 전달됨
    const headers = { "Content-Type": "application/json" };
    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");

    const esc = s => String(s ?? "").replace(/</g, "&lt;");
    const setStatus = msg => { statusEl.textContent = msg; };
    let currentRecords = [];   // 수정 모드에서 원본 값 참조용

    // 목록 불러오기 (READ)
    async function load() {
      setStatus("불러오는 중...");
      try {
        const res = await fetch(API, { headers });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const data = await res.json();
        currentRecords = data.records;
        render(currentRecords);
        setStatus(`${data.records.length}개 레코드`);
      } catch (e) {
        setStatus("오류: " + e.message);
      }
    }

    // 일반 표시 행
    function render(records) {
      rowsEl.innerHTML = "";
      records.forEach(rec => {
        const f = rec.fields;
        const tr = document.createElement("tr");
        tr.id = "row-" + rec.id;
        tr.innerHTML = `
          <td>${esc(f["필드명"])}</td>
          <td>${esc(f["타입"])}</td>
          <td>${esc(f["설명"])}</td>
          <td>
            <button onclick="editRow('${rec.id}')">수정</button>
            <button class="del" onclick="removeItem('${rec.id}')">삭제</button>
          </td>
        `;
        rowsEl.appendChild(tr);
      });
    }

    // 행을 입력칸으로 전환 (수정 모드)
    function editRow(id) {
      const rec = currentRecords.find(r => r.id === id);
      if (!rec) return;
      const f = rec.fields;
      const tr = document.getElementById("row-" + id);
      tr.innerHTML = `
        <td><input type="text" id="e_name_${id}" value="${esc(f["필드명"])}"></td>
        <td><input type="text" id="e_type_${id}" value="${esc(f["타입"])}"></td>
        <td><input type="text" id="e_desc_${id}" value="${esc(f["설명"])}"></td>
        <td>
          <button onclick="saveEdit('${id}')">저장</button>
          <button class="del" onclick="load()">취소</button>
        </td>
      `;
    }

    // 수정 저장 (UPDATE / PATCH)
    async function saveEdit(id) {
      const name = document.getElementById("e_name_" + id).value.trim();
      const type = document.getElementById("e_type_" + id).value.trim();
      const desc = document.getElementById("e_desc_" + id).value.trim();
      setStatus("수정 중...");
      try {
        const res = await fetch(`${API}/${id}`, {
          method: "PATCH",
          headers,
          body: JSON.stringify({
            fields: { "필드명": name, "타입": type, "설명": desc },
            typecast: true
          })
        });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText} — ${await res.text()}`);
        await load();
      } catch (e) {
        setStatus("수정 실패: " + e.message);
      }
    }

    // 추가 (CREATE)
    async function addItem() {
      const name = document.getElementById("f_name").value.trim();
      const type = document.getElementById("f_type").value.trim();
      const desc = document.getElementById("f_desc").value.trim();
      if (!name) { setStatus("필드명은 필수입니다."); return; }
      setStatus("추가 중...");
      try {
        const res = await fetch(API, {
          method: "POST",
          headers,
          body: JSON.stringify({
            fields: { "필드명": name, "타입": type, "설명": desc },
            typecast: true
          })
        });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText} — ${await res.text()}`);
        document.getElementById("f_name").value = "";
        document.getElementById("f_type").value = "";
        document.getElementById("f_desc").value = "";
        await load();
      } catch (e) {
        setStatus("추가 실패: " + e.message);
      }
    }

    // 삭제 (DELETE)
    async function removeItem(id) {
      if (!confirm("삭제할까요?")) return;
      try {
        const res = await fetch(`${API}/${id}`, { method: "DELETE", headers });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        await load();
      } catch (e) {
        setStatus("삭제 실패: " + e.message);
      }
    }

    load();
  </script>
</body>
</html>
