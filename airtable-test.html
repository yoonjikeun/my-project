<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airtable DB ьЁїВіцьіИ</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: "Segoe UI", "Malgun Gothic", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.6rem; }
    .form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin: 16px 0; }
    input[type=text] { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; background: #764ba2; color: #fff; cursor: pointer; font-size: 0.95rem; }
    button.del { background: #e74c3c; padding: 6px 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    th { color: #555; font-size: 0.85rem; }
    #status { color: #888; font-size: 0.9rem; min-height: 1.2em; margin-top: 10px; }
    .note { background: #fff7e6; border: 1px solid #ffd591; padding: 12px; border-radius: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>РўЋ Airtable DB ьЁїВіцьіИ Рђћ Jobmongz1</h1>

  <!-- ьєаьЂ░ вЊ▒ ВёцВаЋЖ░њВЮђ config.js (gitignoreвље)ВЌљВёю вХѕвЪгВўхвІѕвІц. -->
  <script src="config.js"></script>

  <div class="note">
    Рџа№ИЈ ьЁїВіцьіИВџЕВъЁвІѕвІц. ьєаьЂ░ВЮ┤ вИївЮ╝Вџ░Вађ ВйћвЊюВЌљ вЁИВХювљўвІѕ вАюВ╗гВЌљВёювДї ВѓгВџЕьЋўЖ│а, вЂЮвѓўвЕ┤ AirtableВЌљВёю ьєаьЂ░ВЮё ьЈљЖИ░(revoke)ьЋўВёИВџћ.
  </div>

  <div class="form">
    <input type="text" id="f_name" placeholder="ьЋёвЊювфЁ">
    <input type="text" id="f_type" placeholder="ьЃђВъЁ">
    <input type="text" id="f_desc" placeholder="ВёцвфЁ">
    <button onclick="addItem()">ВХћЖ░ђ</button>
  </div>

  <div id="status">вХѕвЪгВўцвіћ ВцЉ...</div>

  <table>
    <thead>
      <tr><th>ьЋёвЊювфЁ</th><th>ьЃђВъЁ</th><th>ВёцвфЁ</th><th></th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const API = `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${encodeURIComponent(CONFIG.TABLE)}`;
    const headers = {
      "Authorization": `Bearer ${CONFIG.TOKEN}`,
      "Content-Type": "application/json"
    };
    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");

    const esc = s => String(s ?? "").replace(/</g, "&lt;");
    const setStatus = msg => { statusEl.textContent = msg; };
    let currentRecords = [];   // ВѕўВаЋ вфевЊюВЌљВёю ВЏљв│И Ж░њ В░ИВА░ВџЕ

    // вфЕвАЮ вХѕвЪгВўцЖИ░ (READ)
    async function load() {
      setStatus("вХѕвЪгВўцвіћ ВцЉ...");
      try {
        const res = await fetch(API, { headers });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const data = await res.json();
        currentRecords = data.records;
        render(currentRecords);
        setStatus(`${data.records.length}Ж░ю ваѕВйћвЊю`);
      } catch (e) {
        setStatus("ВўцвЦў: " + e.message);
      }
    }

    // ВЮ╝в░ў ьЉюВІю ьќЅ
    function render(records) {
      rowsEl.innerHTML = "";
      records.forEach(rec => {
        const f = rec.fields;
        const tr = document.createElement("tr");
        tr.id = "row-" + rec.id;
        tr.innerHTML = `
          <td>${esc(f["ьЋёвЊювфЁ"])}</td>
          <td>${esc(f["ьЃђВъЁ"])}</td>
          <td>${esc(f["ВёцвфЁ"])}</td>
          <td>
            <button onclick="editRow('${rec.id}')">ВѕўВаЋ</button>
            <button class="del" onclick="removeItem('${rec.id}')">ВѓГВаю</button>
          </td>
        `;
        rowsEl.appendChild(tr);
      });
    }

    // ьќЅВЮё ВъЁваЦВ╣ИВю╝вАю ВаёьЎў (ВѕўВаЋ вфевЊю)
    function editRow(id) {
      const rec = currentRecords.find(r => r.id === id);
      if (!rec) return;
      const f = rec.fields;
      const tr = document.getElementById("row-" + id);
      tr.innerHTML = `
        <td><input type="text" id="e_name_${id}" value="${esc(f["ьЋёвЊювфЁ"])}"></td>
        <td><input type="text" id="e_type_${id}" value="${esc(f["ьЃђВъЁ"])}"></td>
        <td><input type="text" id="e_desc_${id}" value="${esc(f["ВёцвфЁ"])}"></td>
        <td>
          <button onclick="saveEdit('${id}')">ВађВъЦ</button>
          <button class="del" onclick="load()">ВиеВєї</button>
        </td>
      `;
    }

    // ВѕўВаЋ ВађВъЦ (UPDATE / PATCH)
    async function saveEdit(id) {
      const name = document.getElementById("e_name_" + id).value.trim();
      const type = document.getElementById("e_type_" + id).value.trim();
      const desc = document.getElementById("e_desc_" + id).value.trim();
      setStatus("ВѕўВаЋ ВцЉ...");
      try {
        const res = await fetch(`${API}/${id}`, {
          method: "PATCH",
          headers,
          body: JSON.stringify({
            fields: { "ьЋёвЊювфЁ": name, "ьЃђВъЁ": type, "ВёцвфЁ": desc },
            typecast: true
          })
        });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText} Рђћ ${await res.text()}`);
        await load();
      } catch (e) {
        setStatus("ВѕўВаЋ ВІцьїе: " + e.message);
      }
    }

    // ВХћЖ░ђ (CREATE)
    async function addItem() {
      const name = document.getElementById("f_name").value.trim();
      const type = document.getElementById("f_type").value.trim();
      const desc = document.getElementById("f_desc").value.trim();
      if (!name) { setStatus("ьЋёвЊювфЁВЮђ ьЋёВѕўВъЁвІѕвІц."); return; }
      setStatus("ВХћЖ░ђ ВцЉ...");
      try {
        const res = await fetch(API, {
          method: "POST",
          headers,
          body: JSON.stringify({
            fields: { "ьЋёвЊювфЁ": name, "ьЃђВъЁ": type, "ВёцвфЁ": desc },
            typecast: true
          })
        });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText} Рђћ ${await res.text()}`);
        document.getElementById("f_name").value = "";
        document.getElementById("f_type").value = "";
        document.getElementById("f_desc").value = "";
        await load();
      } catch (e) {
        setStatus("ВХћЖ░ђ ВІцьїе: " + e.message);
      }
    }

    // ВѓГВаю (DELETE)
    async function removeItem(id) {
      if (!confirm("ВѓГВаюьЋаЖ╣їВџћ?")) return;
      try {
        const res = await fetch(`${API}/${id}`, { method: "DELETE", headers });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        await load();
      } catch (e) {
        setStatus("ВѓГВаю ВІцьїе: " + e.message);
      }
    }

    load();
  </script>
</body>
</html>
